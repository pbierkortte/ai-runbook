name: Update Generated Files

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: echo script >> $GITHUB_PATH
      - run: hydrate-agents
      - run: update-contents
      - run: update-manifest
      - run: dehydrate-agents
      - run: commit-changes
